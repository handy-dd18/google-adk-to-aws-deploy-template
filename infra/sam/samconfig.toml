version = 0.1

[default]
[default.deploy]
[default.deploy.parameters]
stack_name = "strands-aws-template-dev-app"
resolve_s3 = true
s3_prefix = "strands-aws-template-dev-app"
region = "ap-northeast-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
# Replace REPLACE_WITH_TERRAFORM_OUTPUT values with:
# terraform output athena_workgroup_name / glue_database_name / athena_results_bucket_name / s3_data_bucket_name
parameter_overrides = [
  "ProjectName=strands-aws-template",
  "Environment=dev",
  "AppExecutionMode=cloud",
  "CorsAllowOrigins=http://localhost:3000",
  "AthenaWorkgroupName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "AthenaDatabaseName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "AthenaResultsBucketName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "DataBucketName=REPLACE_WITH_TERRAFORM_OUTPUT",
]

[stg]
[stg.deploy]
[stg.deploy.parameters]
stack_name = "strands-aws-template-stg-app"
resolve_s3 = true
s3_prefix = "strands-aws-template-stg-app"
region = "ap-northeast-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "ProjectName=strands-aws-template",
  "Environment=stg",
  "AppExecutionMode=cloud",
  "CorsAllowOrigins=https://example-stg.com",
  "AthenaWorkgroupName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "AthenaDatabaseName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "AthenaResultsBucketName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "DataBucketName=REPLACE_WITH_TERRAFORM_OUTPUT",
]

[prod]
[prod.deploy]
[prod.deploy.parameters]
stack_name = "strands-aws-template-prod-app"
resolve_s3 = true
s3_prefix = "strands-aws-template-prod-app"
region = "ap-northeast-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = [
  "ProjectName=strands-aws-template",
  "Environment=prod",
  "AppExecutionMode=cloud",
  "CorsAllowOrigins=https://example.com",
  "AthenaWorkgroupName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "AthenaDatabaseName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "AthenaResultsBucketName=REPLACE_WITH_TERRAFORM_OUTPUT",
  "DataBucketName=REPLACE_WITH_TERRAFORM_OUTPUT",
]
